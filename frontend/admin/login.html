<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — FortisPH</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">⚡ FortisPH</div>
      <div class="logo-sub">Admin Portal</div>
    </div>

    <h2 class="auth-title">Administrator Login</h2>
    <p class="auth-subtitle">Restricted access — authorized personnel only</p>

    <form id="admin-login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Admin username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="current-password" required />
      </div>
      <div id="error-msg" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Login</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/assets/js/api.js"></script>
<script>
  // If already admin, go straight to dashboard
  const existing = getToken();
  if (existing) {
    const decoded = decodeToken(existing);
    if (decoded && decoded.role === 'admin' && decoded.exp * 1000 > Date.now()) {
      window.location.href = '/admin/index.html';
    }
  }

  async function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    errorMsg.classList.add('hidden');

    try {
      const res = await fetch(`${BASE_URL}/api/auth/admin-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (res.ok && data.ok) {
        setToken(data.token);
        setUser(data.user);
        window.location.href = '/admin/index.html';
      } else {
        errorMsg.textContent = data.error || 'Invalid credentials';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    } catch (err) {
      errorMsg.textContent = 'Network error. Please try again.';
      errorMsg.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }
</script>
</body>
</html>
