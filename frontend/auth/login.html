<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FortisPH</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">⚡ FortisPH</div>
        <div class="subtitle">Philippine Investment Platform</div>
      </div>

      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Sign in to your account</p>

      <div id="error-alert" class="alert alert-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Login
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="/auth/register.html">Create one</a>
      </div>
      <div class="auth-switch" style="margin-top: 8px;">
        <a href="/index.html" style="color: var(--text-muted); font-size: 13px;">← Back to home</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/assets/js/api.js"></script>
  <script>
    // Redirect if already logged in
    const existingToken = getToken();
    if (existingToken) {
      const decoded = decodeToken(existingToken);
      if (decoded && decoded.exp * 1000 > Date.now()) {
        window.location.href = decoded.role === 'admin' ? '/admin/index.html' : '/dashboard/index.html';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-alert');
      errorEl.style.display = 'none';

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await apiFetch('/api/auth/login', 'POST', { email, password });

      if (res && res.ok) {
        setToken(res.data.token);
        setUser(res.data.user);
        showToast('Welcome back!', `Logged in as ${res.data.user.username}`, 'success');
        setTimeout(() => {
          window.location.href = res.data.user.role === 'admin' ? '/admin/index.html' : '/dashboard/index.html';
        }, 500);
      } else {
        const msg = res?.data?.error || 'Login failed. Try again.';
        errorEl.textContent = msg;
        errorEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
