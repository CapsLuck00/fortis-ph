<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — FortisPH</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">⚡ FortisPH</div>
        <div class="subtitle">Philippine Investment Platform</div>
      </div>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Start earning interest from day one</p>

      <div id="error-alert" class="alert alert-error" style="display:none;"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="e.g. juan_trader" required minlength="3" maxlength="30" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter your password" required autocomplete="new-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="/auth/login.html">Sign in</a>
      </div>
      <div class="auth-switch" style="margin-top: 8px;">
        <a href="/index.html" style="color: var(--text-muted); font-size: 13px;">← Back to home</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/assets/js/api.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-alert');
      errorEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'flex';
        return;
      }

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const res = await apiFetch('/api/auth/register', 'POST', { username, email, password });

      if (res && res.ok) {
        setToken(res.data.token);
        setUser(res.data.user);
        showToast('Account created!', 'Welcome to FortisPH!', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard/index.html';
        }, 600);
      } else {
        const msg = res?.data?.error || 'Registration failed. Try again.';
        errorEl.textContent = msg;
        errorEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
