<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Markets &#8212; FortisPH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080d18;--bg2:#0c1220;--bg3:#111827;--border:#1f2937;--border2:rgba(255,255,255,0.06);--text:#f9fafb;--muted:#6b7280;--muted2:#9ca3af;--green:#10b981;--green-dim:rgba(16,185,129,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--gold:#f59e0b;--gold-dim:rgba(245,158,11,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--sidebar-w:200px;--ticker-h:44px;--radius:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden}
#ticker-bar{position:fixed;top:0;left:0;right:0;height:var(--ticker-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:100}
.ticker-brand{padding:0 16px;font-weight:800;font-size:14px;white-space:nowrap;border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;height:100%}
.ticker-items{flex:1;display:flex;align-items:center;overflow:hidden}
.ticker-item{padding:0 16px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border);height:var(--ticker-h);white-space:nowrap}
.t-name{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.t-val{font-size:12px;font-weight:700}.t-chg{font-size:11px;font-weight:600}.t-chg.up{color:var(--green)}.t-chg.dn{color:var(--red)}
.ticker-user{padding:0 16px;display:flex;align-items:center;gap:10px;border-left:1px solid var(--border)}
.u-name{font-size:12px;font-weight:700}.u-badge{font-size:10px;color:var(--gold);background:var(--gold-dim);padding:2px 6px;border-radius:4px;font-weight:600}
.ticker-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
#app{position:fixed;top:var(--ticker-h);left:0;right:0;bottom:0;display:flex;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.nav-section{padding:14px 0 6px}.nav-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:0 16px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;color:var(--muted2);font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:var(--text);background:rgba(59,130,246,0.1);border-left-color:var(--blue);font-weight:600}
.nav-icon{width:16px;text-align:center;font-size:14px}
.nb-new{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:auto;background:var(--blue);color:#fff}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.sidebar-user-card{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.s-name{font-size:13px;font-weight:700}.s-bal{font-size:11px;color:var(--green);font-weight:600}
#main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.page-title{font-size:20px;font-weight:800;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
.btn-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold)}.btn-gold:hover{background:var(--gold);color:#000}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--blue)}
input::placeholder{color:var(--muted)}
label{font-size:12px;color:var(--muted2);font-weight:500;display:block;margin-bottom:5px}
.form-group{margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{font-size:13px;padding:10px 12px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.pending{background:var(--gold-dim);color:var(--gold)}.badge.approved{background:var(--green-dim);color:var(--green)}.badge.rejected{background:var(--red-dim);color:var(--red)}.badge.active{background:var(--green-dim);color:var(--green)}
.badge.win,.badge.trade_win{background:var(--green-dim);color:var(--green)}.badge.loss,.badge.trade_loss{background:var(--red-dim);color:var(--red)}
.tbl-wrap{overflow-x:auto}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;z-index:999;animation:fadeIn .2s;border-left:3px solid var(--green)}
.toast.err{border-left-color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.markets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.market-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border .2s}
.market-card:hover{border-color:var(--blue)}
.mc-header{padding:16px;display:flex;align-items:center;gap:12px}
.mc-logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.mc-name{font-size:15px;font-weight:700}.mc-slug{font-size:11px;color:var(--muted);margin-top:1px}
.mc-price{font-size:26px;font-weight:800;letter-spacing:-1px;padding:0 16px;margin-bottom:2px}
.mc-change{font-size:12px;font-weight:600;padding:0 16px 8px}
.mc-chart{height:70px;padding:0 4px 8px}
.mc-stats{display:flex;border-top:1px solid var(--border)}
.mc-stat{flex:1;padding:9px 10px;text-align:center;border-right:1px solid var(--border)}
.mc-stat:last-child{border-right:none}
.mc-stat-val{font-size:13px;font-weight:700}.mc-stat-label{font-size:10px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="ticker-bar">
  <div class="ticker-brand">&#9889; FortisPH</div>
  <div class="ticker-items" id="ticker-items"><div class="ticker-item" style="color:var(--muted);font-size:12px">Loading...</div></div>
  <div class="ticker-user"><div><div class="u-name" id="tk-name">&#8212;</div><div class="u-badge">MEMBER</div></div><div class="ticker-avatar" id="tk-avatar">U</div></div>
</div>
<div id="app">
<aside id="sidebar"><div class="nav-section"><div class="nav-label">Overview</div><a href="/dashboard/index.html" class="nav-item"><span class="nav-icon">&#128202;</span>Dashboard</a><a href="/dashboard/wallet.html" class="nav-item"><span class="nav-icon">&#128220;</span>Wallet</a><a href="/dashboard/exchange.html" class="nav-item"><span class="nav-icon">&#128260;</span>Exchange</a><a href="/dashboard/markets.html" class="nav-item active"><span class="nav-icon">&#127758;</span>Markets</a></div><div class="nav-section"><div class="nav-label">Trading</div><a href="/dashboard/trade.html" class="nav-item"><span class="nav-icon">&#9889;</span>Trade</a><a href="/dashboard/copy-trading.html" class="nav-item"><span class="nav-icon">&#128101;</span>Copy Trading<span class="nb-new">NEW</span></a><a href="/dashboard/analytics.html" class="nav-item"><span class="nav-icon">&#128202;</span>Analytics</a></div><div class="nav-section"><div class="nav-label">Account</div><a href="/dashboard/deposit.html" class="nav-item"><span class="nav-icon">&#128179;</span>Deposit</a><a href="/dashboard/withdraw.html" class="nav-item"><span class="nav-icon">&#129319;</span>Withdraw</a><a href="/dashboard/settings.html" class="nav-item"><span class="nav-icon">&#9881;&#65039;</span>Settings</a><a href="/dashboard/education.html" class="nav-item"><span class="nav-icon">&#128218;</span>Education</a></div><div class="sidebar-footer">
    <div class="sidebar-user-card">
      <div class="ticker-avatar" style="width:32px;height:32px;font-size:13px" id="sb-avatar">U</div>
      <div><div class="s-name" id="sb-name">Member</div><div class="s-bal" id="sb-bal">₱&#8212;</div></div>
    </div>
    <a href="#" class="nav-item" onclick="logout();return false" style="color:var(--red);padding:8px 0"><span class="nav-icon">&#128682;</span>Logout</a>
  </div></aside>
<div id="main">
  <div><div class="page-title">&#127758; Markets</div><div class="page-sub">Live provider prices and performance. Click Trade to open a position.</div></div>
  <div class="markets-grid" id="markets-grid"><div style="color:var(--muted);padding:20px">Loading markets&#8230;</div></div>
</div>
</div>
<script src="/assets/js/api.js"></script>
<script>
redirectIfNotLoggedIn();
const _u=getUser();
if(_u){const i=_u.username?.charAt(0).toUpperCase()||'U';document.getElementById('tk-name').textContent=_u.username;document.getElementById('tk-avatar').textContent=i;const sa=document.getElementById('sb-avatar');if(sa)sa.textContent=i;const sn=document.getElementById('sb-name');if(sn)sn.textContent=_u.username;}
async function loadTicker(){const r=await apiFetch('/api/chart/');if(!r||!r.ok)return;const ps=r.data.data?.providers||[];const el=document.getElementById('ticker-items');el.innerHTML=ps.map(p=>{const ch=(Math.random()-.5)*2;const chStr=(ch>=0?'+':'')+ch.toFixed(2)+'%';return '<div class="ticker-item"><span class="t-name">'+p.name+'</span><span class="t-val">₱'+parseFloat(p.current_price||100).toLocaleString('en-PH',{minimumFractionDigits:2})+'</span><span class="t-chg '+(ch>=0?'up':'dn')+'">'+ chStr +'</span></div>';}).join('');}
async function loadDashMini(){const r=await apiFetch('/api/member/dashboard');if(!r||!r.ok)return;const d=r.data.data;if(!d)return;const b=parseFloat(d.balance||0);const sb=document.getElementById('sb-bal');if(sb)sb.textContent='₱'+b.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function showToast(msg,isErr){const t=document.createElement('div');t.className='toast'+(isErr?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
loadTicker();loadDashMini();setInterval(loadTicker,8000);
const logos={jili:'JILI',evolution:'EVO',pragmatic:'PP',sagaming:'SAG'};
const logoColors={
  jili:'linear-gradient(135deg,#e63946,#c1121f)',
  evolution:'linear-gradient(135deg,#023e8a,#0077b6)',
  pragmatic:'linear-gradient(135deg,#f77f00,#d62828)',
  sagaming:'linear-gradient(135deg,#2d6a4f,#40916c)'
};

async function loadMarkets(){
  const r=await apiFetch('/api/chart/');
  if(!r||!r.ok)return;
  const providers=r.data.data?.providers||[];
  const grid=document.getElementById('markets-grid');
  grid.innerHTML=providers.map(p=>{
    const slug=p.slug||'unknown';
    const price=parseFloat(p.current_price||100);
    const chg=((Math.random()-.4)*3).toFixed(2);
    const isUp=parseFloat(chg)>=0;
    const logoText=logos[slug]||slug.substring(0,3).toUpperCase();
    const logoColor=logoColors[slug]||'linear-gradient(135deg,var(--blue),var(--gold))';
    return '<div class="market-card"><div class="mc-header"><div class="mc-logo" style="background:'+logoColor+'">'+logoText+'</div><div><div class="mc-name">'+p.name+'</div><div class="mc-slug">'+slug.toUpperCase()+' &#183; '+(p.is_active?'<span style="color:var(--green)">Active</span>':'<span style="color:var(--red)">Inactive</span>')+'</div></div></div><div class="mc-price" style="color:'+(isUp?'var(--green)':'var(--red)')+'">₱'+price.toLocaleString('en-PH',{minimumFractionDigits:2})+'</div><div class="mc-change" style="color:'+(isUp?'var(--green)':'var(--red)')+'">'+(isUp?'&#9650;':'&#9660;')+' '+Math.abs(chg)+'% today</div><div class="mc-chart"><canvas id="mini-'+p.id+'"></canvas></div><div class="mc-stats"><div class="mc-stat"><div class="mc-stat-val" style="color:var(--gold)">'+(p.win_rate>1?parseFloat(p.win_rate).toFixed(0):(parseFloat(p.win_rate||0.5)*100).toFixed(0))+'%</div><div class="mc-stat-label">Win Rate</div></div><div class="mc-stat"><div class="mc-stat-val">₱'+(price*.95).toFixed(2)+'</div><div class="mc-stat-label">24h Low</div></div><div class="mc-stat"><div class="mc-stat-val">₱'+(price*1.05).toFixed(2)+'</div><div class="mc-stat-label">24h High</div></div></div><div style="padding:10px 12px"><a href="/dashboard/trade.html" style="display:block;text-align:center;padding:9px;background:var(--blue);border-radius:7px;color:#fff;font-weight:600;text-decoration:none;font-size:13px">&#9889; Trade '+p.name+'</a></div></div>';
  }).join('');
  // Mini charts
  for(const p of providers){
    const cR=await apiFetch('/api/chart/'+p.slug+'/candles');
    let pts=[];
    if(cR&&cR.ok)pts=(cR.data.data?.candles||[]).map(c=>parseFloat(c.close));
    if(!pts.length)for(let i=0;i<30;i++)pts.push(100+(Math.random()-.5)*10);
    const ctx=document.getElementById('mini-'+p.id)?.getContext('2d');
    if(!ctx)continue;
    const isUp=pts[pts.length-1]>=pts[0];
    new Chart(ctx,{type:'line',data:{labels:pts.map((_,i)=>i),datasets:[{data:pts,borderColor:isUp?'#10b981':'#ef4444',borderWidth:1.5,fill:false,tension:.3,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
  }
}
loadMarkets();
setInterval(()=>{document.querySelectorAll('.mc-price').forEach(el=>{const v=parseFloat(el.textContent.replace(/[^\d.]/g,''));if(v){const nv=v+(Math.random()-.5)*.5;el.textContent='₱'+nv.toFixed(2);}});},5000);
</script>
</body>
</html>
